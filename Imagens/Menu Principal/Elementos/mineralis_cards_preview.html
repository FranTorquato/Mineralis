<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Mineralis - Preview dos Cards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a0f08;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #D4B896;
  }
  h1 {
    font-size: 28px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #FFD700;
    margin-bottom: 6px;
    text-shadow: 0 0 20px #FFD70066;
  }
  .subtitle {
    font-size: 12px;
    color: #8B6835;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }
  .continent-label {
    font-size: 14px;
    color: #C8A060;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .cards-row {
    display: flex;
    gap: 24px;
    align-items: center;
    margin-bottom: 40px;
  }
  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .card {
    width: 160px;
    height: 160px;
    cursor: pointer;
    transition: transform 0.15s ease;
    image-rendering: pixelated;
    position: relative;
  }
  .card:hover { transform: scale(1.06); }
  .card:active { transform: scale(0.97); }
  .card svg { width: 100%; height: 100%; }

  /* Estado bloqueado */
  .card.locked svg {
    filter: grayscale(100%) brightness(0.6);
  }
  .lock-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    pointer-events: none;
    opacity: 0.9;
    text-shadow: 0 2px 8px #000;
  }
  .card.locked .lock-icon { display: block; }
  .card.unlocked .lock-icon { display: none; }

  /* Animação de desbloqueio */
  @keyframes unlock-flash {
    0%   { filter: brightness(3) grayscale(0); transform: scale(1.15); }
    40%  { filter: brightness(1.5) grayscale(0); transform: scale(1.1); }
    100% { filter: brightness(1) grayscale(0); transform: scale(1); }
  }
  @keyframes unlock-pulse {
    0%  { box-shadow: 0 0 0 0 #FFD70088; }
    50% { box-shadow: 0 0 30px 15px #FFD70033; }
    100%{ box-shadow: 0 0 0 0 #FFD70000; }
  }
  .card.unlocking {
    animation: unlock-flash 0.6s ease-out forwards, unlock-pulse 0.8s ease-out;
  }

  /* Shimmer overlay */
  .shimmer-overlay {
    position: absolute;
    top: 0; left: -50%;
    width: 40%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
    pointer-events: none;
    opacity: 0;
  }
  .shimmer-overlay.active {
    animation: shimmer 0.5s 0.3s ease-out forwards;
  }
  @keyframes shimmer {
    0%  { left: -50%; opacity: 1; }
    100%{ left: 120%; opacity: 0; }
  }

  /* Botão */
  .unlock-btn {
    background: none;
    border: 1px solid #8B6835;
    color: #C8A060;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .unlock-btn:hover {
    background: #8B6835;
    color: #1a0f08;
  }
  .unlock-btn:disabled {
    border-color: #3D2810;
    color: #3D2810;
    cursor: default;
  }
  .phase-label {
    font-size: 10px;
    color: #6B4520;
    letter-spacing: 1px;
  }
  .phase-label.active { color: #C8A060; }

  .controls {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }
  .reset-btn {
    background: none;
    border: 1px solid #4A1810;
    color: #6B2810;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: #4A1810; color: #C84020; }

  .instruction {
    font-size: 11px;
    color: #4A3318;
    margin-top: 30px;
    letter-spacing: 1px;
    text-align: center;
  }
</style>

<div class="instruction">Clique nos botões para simular o desbloqueio das fases · Os cards são SVG puro em pixel art</div>

<script>
  function toggleLock(id, btn) {
    const card = document.getElementById('card-' + id);
    const label = document.getElementById('label-' + id);
    const shimmer = document.getElementById('shimmer-' + id);

    if (card.classList.contains('locked')) {
      // Desbloquear com animação
      card.classList.remove('locked');
      card.classList.add('unlocking');
      shimmer.classList.add('active');

      btn.textContent = '✓ Desbloqueado';
      btn.disabled = true;
      label.classList.add('active');

      setTimeout(() => {
        card.classList.remove('unlocking');
        card.classList.add('unlocked');
        shimmer.classList.remove('active');
      }, 800);
    }
  }

  function selectCard(id) {
    const card = document.getElementById('card-' + id);
    if (card.classList.contains('unlocked')) {
      card.style.outline = '2px solid #FFD700';
      setTimeout(() => card.style.outline = '', 300);
    }
  }

  function resetAll() {
    ['1-2', '1-3'].forEach(id => {
      const card = document.getElementById('card-' + id);
      const label = document.getElementById('label-' + id);
      const btn = card.parentElement.querySelector('.unlock-btn');
      card.classList.remove('unlocked', 'unlocking');
      card.classList.add('locked');
      label.classList.remove('active');
      btn.textContent = '🔓 Desbloquear';
      btn.disabled = false;
    });
  }
</script>
